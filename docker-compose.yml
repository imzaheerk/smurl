version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smurl
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: smurl
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: super-secret-change-me
      BASE_URL: http://localhost:5000
    depends_on:
      - postgres
      - redis
    ports:
      - '5000:5000'

volumes:
  postgres_data:

